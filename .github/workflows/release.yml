name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Windows .exe ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller pillow

      - name: Générer l'icône
        run: python tools/generate_icon.py

      - name: Build EXE
        run: pyinstaller packaging/edusync_ad.spec

      - name: Construire l'installateur (Inno Setup)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" packaging\installer.iss

      - name: Calculer le hash SHA-256
        shell: pwsh
        # Vérifié par l'updater intégré (core/updater.py) avant exécution silencieuse
        # de l'installeur téléchargé — voir _verify_checksum.
        run: |
          (Get-FileHash EduSyncAD-Setup.exe -Algorithm SHA256).Hash.ToLower() | Set-Content -NoNewline EduSyncAD-Setup.exe.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            EduSyncAD-Setup.exe
            EduSyncAD-Setup.exe.sha256

  # ── Build Linux .flatpak ────────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer flatpak et flatpak-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder

      - name: Ajouter le remote Flathub
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Installer le runtime freedesktop
        run: |
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08
          sudo flatpak install -y flathub org.freedesktop.Sdk//23.08

      - name: Build flatpak
        run: |
          flatpak-builder --force-clean --repo=repo flatpak-build packaging/org.edusync.AD.yml
          flatpak build-bundle repo EduSyncAD-linux.flatpak org.edusync.AD

      - name: Calculer le hash SHA-256
        run: sha256sum EduSyncAD-linux.flatpak | cut -d ' ' -f1 > EduSyncAD-linux.flatpak.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            EduSyncAD-linux.flatpak
            EduSyncAD-linux.flatpak.sha256

  # ── Publier la Release GitHub ───────────────────────────────────────────────
  release:
    needs: [build-windows, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Extraire le changelog depuis RELEASE_NOTES.md
        # Un fichier suivi normalement dans le dépôt, pas le message du tag
        # annoté : celui-ci se perd de façon répétée dans la synchronisation
        # Gitea -> GitHub (le tag arrive en lightweight côté GitHub, sans
        # son message), alors qu'un fichier de commit normal, lui, arrive
        # toujours intact.
        run: |
          {
            echo "## EduSync AD ${{ github.ref_name }}"
            echo ""
            cat RELEASE_NOTES.md
            echo ""
            echo "---"
            echo ""
            echo "### Téléchargements"
            echo ""
            echo "| Plateforme | Fichier | Description |"
            echo "|---|---|---|"
            echo "| Windows 10/11 | \`EduSyncAD-Setup.exe\` | Installateur classique (raccourcis menu Démarrer/Bureau, désinstallation propre) |"
            echo "| Linux | \`EduSyncAD-linux.flatpak\` | \`flatpak install EduSyncAD-linux.flatpak\` puis \`flatpak run org.edusync.AD\` |"
            echo ""
            echo "Les fichiers \`.sha256\` associés permettent de vérifier l'intégrité du"
            echo "téléchargement (\`certutil -hashfile EduSyncAD-Setup.exe SHA256\` sous Windows,"
            echo "\`sha256sum -c EduSyncAD-linux.flatpak.sha256\` sous Linux) — la mise à jour"
            echo "intégrée de l'application les vérifie déjà automatiquement."
            echo ""
            echo "### Prérequis"
            echo "- Active Directory accessible sur le réseau (LDAP port 389 ou LDAPS port 636)"
            echo "- Compte administrateur du domaine avec droits de création/modification de comptes"
            echo ""
            echo "Voir le [guide utilisateur](docs/guide_utilisateur.md) pour la prise en main complète."
          } > release_notes.md

      - name: Créer la Release et uploader les artefacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "EduSync AD ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            EduSyncAD-Setup.exe
            EduSyncAD-Setup.exe.sha256
            EduSyncAD-linux.flatpak
            EduSyncAD-linux.flatpak.sha256
          draft: false
          prerelease: false
