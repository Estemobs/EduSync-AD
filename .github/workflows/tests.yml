name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lancer la suite de tests
        # La logique métier (tests/core) ne dépend jamais de PyQt6 directement,
        # donc aucun environnement graphique (Xvfb, libEGL…) n'est requis ici —
        # voir core/csv_io.py::load_identifiers_csv pour l'exemple de cette règle.
        run: pytest -v
