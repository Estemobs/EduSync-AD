app-id: org.edusync.AD
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python311

command: edusync-ad

finish-args:
  - --share=network          # Accès réseau (LDAP/LDAPS)
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --filesystem=home        # Lecture/écriture des CSV de l'utilisateur

build-options:
  append-path: /usr/lib/sdk/python311/bin
  env:
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app PyQt6 ldap3 cryptography platformdirs
    sources:
      - type: shell
        commands: []

  - name: edusync-ad
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
    sources:
      - type: dir
        path: ..
